# 使用 docsify-sitemap 生成 sitemap.xml，便于搜索引擎收录
# 文档：https://www.npmjs.com/package/docsify-sitemap | Web UI：https://tenelabs.github.io/docsify-sitemap/
name: Generate Sitemap

on:
  push:
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sitemap
        run: |
          npx docsify-sitemap@latest local \
            -u "https://didilili.github.io/ai-agents-from-zero/" \
            -f ./sitemap.xml \
            -i

      - name: Commit sitemap
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          git diff --cached --quiet || git commit -m 'chore: update sitemap.xml'
          git push
